<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7b6630">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>禁煙記録</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">今日の記録</p>
      <h1 id="today-date" class="today-date">----</h1>

      <div class="metric-block">
        <p class="metric-label">経過時間</p>
        <p id="elapsed-time" class="metric-value">--:--:--</p>
      </div>

      <div class="metric-block count-block">
        <p class="metric-label">当日の喫煙本数</p>
        <p id="daily-count" class="daily-count">0</p>
      </div>
    </section>

    <section class="history-card">
      <div class="history-header">
        <h2>登録履歴</h2>
        <p>最新10件</p>
      </div>
      <ol id="history-list" class="history-list"></ol>
    </section>

    <button id="increment-button" class="increment-button" type="button" aria-label="喫煙を記録">
      <span>+</span>
    </button>
  </main>

  <script src="app.js"></script>
</body>
</html>
